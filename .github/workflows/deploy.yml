name: CI/CD - Build and Push Docker Image to Docker Hub

# Trigger: Chỉ chạy khi có push lên nhánh main
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build Docker Image & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout mã nguồn từ GitHub
      - name: Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bước 3: Đăng nhập vào Docker Hub bằng lệnh trực tiếp
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "nhatcuong1208" --password-stdin

      # Bước 4: Build image và Push lên Docker Hub (có tag)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            nhatcuong1208/daonhatcuong-springboot:latest
            nhatcuong1208/daonhatcuong-springboot:${{ github.sha }}

      # Bước 5: Gọi webhook API để kích hoạt Server tự động Deploy
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="nhatcuong1208/daonhatcuong-springboot"
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
              echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
              echo "::group::Chi tiết webhook JSON"
              echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
              echo "::endgroup::"
              exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
