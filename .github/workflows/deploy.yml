name: CI/CD - Build and Push Docker Image to Docker Hub

# Trigger: Chỉ chạy khi có push lên nhánh main
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build Docker Image & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout mã nguồn từ GitHub
      - name: Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Đăng nhập vào Docker Hub (dùng Secrets đã cấu hình)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Bước 3: Build image và Push lên Docker Hub (có tag)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/daonhatcuong-springboot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/daonhatcuong-springboot:${{ github.sha }}
