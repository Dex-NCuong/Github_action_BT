name: CI/CD - Build and Push Docker Image to Docker Hub

# Trigger: Chỉ chạy khi có push lên nhánh main
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build Docker Image & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout mã nguồn từ GitHub
      - name: Checkout source code
        uses: actions/checkout@v4

      # Bước 2: Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bước 3: Đăng nhập vào Docker Hub bằng lệnh trực tiếp
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # Bước 4: Build image và Push lên Docker Hub (có tag)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/daonhatcuong-springboot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/daonhatcuong-springboot:${{ github.sha }}

